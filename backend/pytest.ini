[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

[tool:coverage:run]
source = src
omit = 
    */tests/*
    */__pycache__/*
    */site-packages/*

[tool:coverage:report]
precision = 2
show_missing = True
skip_covered = False

[tool:coverage:html]
directory = htmlcov
