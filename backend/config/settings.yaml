app:
  name: GraphRAG
  version: "1.0.0"
  debug: true
  domain: medical

neo4j:
  uri: ${NEO4J_URI}
  username: ${NEO4J_USERNAME}
  password: ${NEO4J_PASSWORD}
  max_connection_lifetime: 3600
  max_connection_pool_size: 50
  connection_acquisition_timeout: 60

dashscope:
  api_key: ${DASHSCOPE_API_KEY}
  base_url: ${DASHSCOPE_BASE_URL}
  model: ${DASHSCOPE_MODEL}
  temperature: 0.0
  max_tokens: 2000

embedding:
  model: ${EMBEDDING_MODEL}
  dimensions: ${EMBEDDING_DIMENSIONS}
  batch_size: 100

retrieval:
  vector_top_k: 5
  graph_top_k: 10
  hybrid_alpha: 0.5

cache:
  enabled: ${CACHE_ENABLED}
  ttl: ${CACHE_TTL}
  max_size: 1000

document:
  chunk_size: 1000
  chunk_overlap: 200
  split_strategy: hybrid  # paragraph, sentence, markdown, hybrid
  keep_code_blocks: true
  keep_headers: true
  supported_formats:
    - pdf
    - docx
    - txt
    - md
    - csv
  loader:
    max_retries: 3
    retry_delay: 0.5
    skip_empty: true
    min_content_length: 10